<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Tube rotated 60 degrees, centered, no shadows or sheens -->
  <g transform="translate(50,50) rotate(-60)">
    <!-- Tube body -->
    <rect x="-12" y="-36" width="24" height="62" rx="10" fill="currentColor"/>
    <!-- Top rim/cap -->
    <rect x="-14" y="-42" width="28" height="10" rx="5" fill="currentColor"/>
    <!-- Bottom curved base -->
    <ellipse cx="0" cy="26" rx="12" ry="5" fill="currentColor"/>
  </g>
</svg>
