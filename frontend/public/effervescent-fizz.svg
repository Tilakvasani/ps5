<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Water surface ripples -->
  <path d="M15,55 C25,50 35,60 50,55 C65,50 75,60 85,55" opacity="0.4" />
  
  <!-- Effervescent tablet dissolving (dashed outer ring + solid core) -->
  <circle cx="50" cy="65" r="15" stroke-dasharray="6,5" />
  <circle cx="50" cy="65" r="8" fill="currentColor" />

  <!-- Rising carbonation bubbles of different sizes -->
  <circle cx="42" cy="40" r="3.5" fill="currentColor" stroke="none" />
  <circle cx="58" cy="36" r="2.5" fill="currentColor" stroke="none" />
  <circle cx="50" cy="26" r="4.5" fill="currentColor" stroke="none" />
  <circle cx="40" cy="18" r="2" fill="currentColor" stroke="none" />
  <circle cx="56" cy="14" r="3" fill="currentColor" stroke="none" />
  <circle cx="48" cy="8" r="1.5" fill="currentColor" stroke="none" />
</svg>
